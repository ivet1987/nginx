server {
    listen       127.0.0.1:8071 ssl;
    listen       127.0.0.1:8070;
    server_name  localhost;
    
    
    
    ssl_protocols               TLSv1.3;
    ssl_ciphers                 ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers   on;
    ssl_ecdh_curve              secp384r1;
    
    ssl_certificate_key         /etc/nginx/certificates/localhost/key.pem;
    ssl_certificate             /etc/nginx/certificates/localhost/cert.pem;

    location / {
        # index index.html by default
    }
    
    location /proxy {
        proxy_pass https://127.0.0.1:8071/;
    }
}
