server {
    listen 9080;

    location / {
        proxy_pass http://127.0.0.1:9081/;
    }

    location /img/ {
        proxy_pass http://127.0.0.1:9082/;
    }

    location ~ \.js {
        proxy_pass http://127.0.0.1:9083;
    }
}

server {
    listen 9081;

    root %%nginxROOTDIR%%/default;
}

server {
    listen 9082;

    root %%nginxROOTDIR%%/images;
}

server {
    listen 9083;

    root %%nginxROOTDIR%%/scripts;
}
